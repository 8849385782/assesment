<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact VentureFlow</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">

        <div class="container">

            <a class="navbar-brand fw-bold"
               href="index.html">

                <span class="text-primary">V</span>
                VentureFlow

            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="navbarNav">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">

                        <a class="nav-link"
                           href="index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="services.html">

                            Services

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link"
                           href="about.html">

                            About

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="contact.html">

                            Contact

                        </a>

                    </li>

                </ul>

                <button class="btn btn-primary px-4">

                    Get Started

                </button>

            </div>

        </div>

    </nav>

    <!-- Contact Hero -->

    <section class="mini-hero text-center py-5">

        <div class="container">

            <h1 class="display-4 fw-bold">

                Contact Page

            </h1>

            <p class="lead mt-3">

                We'd love to hear from you.
                Fill out the form below.

            </p>

        </div>

    </section>

    <!-- Contact Section -->

    <section class="contact-section py-5">

        <div class="container">

            <div class="row g-4">

                <!-- Contact Form -->

                <div class="col-lg-7">

                    <div class="card shadow border-0 rounded-4 p-4">

                        <h2 class="fw-bold mb-4">

                            Send Us a Message

                        </h2>

                        <form id="contactForm">

                            <div class="mb-4">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input type="text"
                                       id="name"
                                       class="form-control"
                                       placeholder="Enter your name"
                                       required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <input type="email"
                                       id="email"
                                       class="form-control"
                                       placeholder="Enter your email"
                                       required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">

                                    Message

                                </label>

                                <textarea class="form-control"
                                          id="message"
                                          rows="5"
                                          placeholder="Enter your message"
                                          required></textarea>

                            </div>

                            <button type="submit"
                                    class="btn btn-primary w-100">

                                Send Message

                            </button>

                        </form>

                        <!-- Success Message -->

                        <div id="successMessage"
                             class="alert alert-success mt-4 d-none">

                            Message sent successfully!

                        </div>

                    </div>

                </div>

                <!-- Recent Messages -->

                <div class="col-lg-5">

                    <div class="card shadow border-0 rounded-4 p-4">

                        <h3 class="fw-bold mb-4">

                            Recent Messages

                        </h3>

                        <table class="table">

                            <thead>

                                <tr>

                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Email</th>

                                </tr>

                            </thead>

                            <tbody id="tableBody">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="footer text-white text-center p-4">

        <p class="mb-0">

            © 2025 VentureFlow. All rights reserved.

        </p>

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>
</html>
