<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>StartupX - Contact</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

      <a class="navbar-brand fw-bold"
         href="index.html">

        StartupX

      </a>

      <button class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navMenu">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse"
           id="navMenu">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link"
               href="index.html">

               Home

            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link"
               href="services.html">

               Services

            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active"
               href="contact.html">

               Contact

            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Contact Form -->
  <div class="container py-5">

    <h1 class="text-center text-primary mb-5">
      Contact Us
    </h1>

    <div class="row justify-content-center">

      <div class="col-md-6">

        <form id="contactForm">

          <div class="mb-3">

            <label>Name</label>

            <input type="text"
                   id="name"
                   class="form-control"
                   required>

          </div>

          <div class="mb-3">

            <label>Email</label>

            <input type="email"
                   id="email"
                   class="form-control"
                   required>

          </div>

          <div class="mb-3">

            <label>Phone Number</label>

            <input type="tel"
                   id="phone"
                   class="form-control"
                   required>

          </div>

          <div class="mb-3">

            <label>Message</label>

            <textarea id="message"
                      rows="4"
                      class="form-control"
                      required></textarea>

          </div>

          <button type="submit"
                  class="btn btn-primary w-100">

            Send Message

          </button>

        </form>

        <p id="successMsg"
           class="text-success text-center mt-3"></p>

      </div>

    </div>

    <!-- Data Table -->
    <div class="mt-5">

      <h2 class="text-center text-primary mb-4">
        Submitted Data
      </h2>

      <table class="table table-bordered table-striped">

        <thead class="table-primary">

          <tr>

            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>

          </tr>

        </thead>

        <tbody id="dataTable">

        </tbody>

      </table>

    </div>

  </div>

  <script src="script.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
